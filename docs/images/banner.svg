<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#161b22;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f72585;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#b5179e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7209b7;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bgGrad)"/>

  <!-- Border accent -->
  <rect x="1" y="1" width="798" height="198" rx="12" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6"/>

  <!-- Decorative circles -->
  <circle cx="70" cy="100" r="55" fill="#f72585" opacity="0.06"/>
  <circle cx="70" cy="100" r="35" fill="#f72585" opacity="0.08"/>
  <circle cx="730" cy="100" r="55" fill="#7209b7" opacity="0.06"/>
  <circle cx="730" cy="100" r="35" fill="#7209b7" opacity="0.08"/>

  <!-- Decorative dots pattern -->
  <g opacity="0.08" fill="#f72585">
    <circle cx="20" cy="20" r="1.5"/>
    <circle cx="40" cy="20" r="1.5"/>
    <circle cx="60" cy="20" r="1.5"/>
    <circle cx="20" cy="40" r="1.5"/>
    <circle cx="40" cy="40" r="1.5"/>
    <circle cx="740" cy="160" r="1.5"/>
    <circle cx="760" cy="160" r="1.5"/>
    <circle cx="780" cy="160" r="1.5"/>
    <circle cx="740" cy="180" r="1.5"/>
    <circle cx="760" cy="180" r="1.5"/>
  </g>

  <!-- Microscope icon -->
  <g transform="translate(70, 100)" filter="url(#glow)">
    <text text-anchor="middle" dominant-baseline="central" font-size="44" fill="#f72585">🔬</text>
  </g>

  <!-- Title -->
  <text x="400" y="78" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="700" fill="#e6edf3" filter="url(#glow)">Research Paper Q&amp;A</text>

  <!-- Accent line under title -->
  <rect x="250" y="92" width="300" height="3" rx="1.5" fill="url(#accentGrad)" opacity="0.8"/>

  <!-- Tagline -->
  <text x="400" y="125" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#8b949e" letter-spacing="0.5">AI-Powered Interactive Paper Analysis with Citation Tracking</text>

  <!-- Tech badges -->
  <g transform="translate(400, 160)" text-anchor="middle">
    <!-- Ollama badge -->
    <rect x="-180" y="-12" width="72" height="24" rx="12" fill="#f72585" opacity="0.15" stroke="#f72585" stroke-width="1" stroke-opacity="0.3"/>
    <text x="-144" y="4" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#f72585" text-anchor="middle" font-weight="600">Ollama</text>

    <!-- Gemma 4 badge -->
    <rect x="-90" y="-12" width="76" height="24" rx="12" fill="#b5179e" opacity="0.15" stroke="#b5179e" stroke-width="1" stroke-opacity="0.3"/>
    <text x="-52" y="4" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#b5179e" text-anchor="middle" font-weight="600">Gemma 4</text>

    <!-- Python badge -->
    <rect x="4" y="-12" width="72" height="24" rx="12" fill="#7209b7" opacity="0.15" stroke="#7209b7" stroke-width="1" stroke-opacity="0.3"/>
    <text x="40" y="4" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#7209b7" text-anchor="middle" font-weight="600">Python</text>

    <!-- Private badge -->
    <rect x="94" y="-12" width="82" height="24" rx="12" fill="#f72585" opacity="0.15" stroke="#f72585" stroke-width="1" stroke-opacity="0.3"/>
    <text x="135" y="4" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#f72585" text-anchor="middle" font-weight="600">🔒 Private</text>
  </g>
</svg>
